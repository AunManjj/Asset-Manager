      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # Slack
  /slack/logs:
    get:
      operationId: listSlackLogs
      tags: [slack]
      summary: List Slack message logs
      responses:
        "200":
          description: List of Slack logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SlackLog"

  /slack/send:
    post:
      operationId: sendSlackMessage
      tags: [slack]
      summary: Send a Slack message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SlackMessageInput"
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlackLog"

  # Dashboard Summary
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get overall dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity-feed:
    get:
      operationId: getActivityFeed
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityFeedItem"

  /dashboard/performance:
    get:
      operationId: getPerformanceMetrics
      tags: [dashboard]
      summary: Get performance metrics over time
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: Performance metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerformanceMetrics"

  /meta/config:
    get:
      operationId: getMetaConfig
      tags: [meta]
      summary: Get Meta OAuth configuration
      responses:
        "200":
          description: Meta config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetaConfig"

  /meta/status/{clientId}:
    get:
      operationId: getMetaStatus
      tags: [meta]
      summary: Get Meta connection status for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Meta status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetaStatus"

  /meta/campaigns/{clientId}:
    get:
      operationId: getMetaCampaigns
      tags: [meta]
      summary: Fetch campaigns from Meta Ads API
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Meta campaigns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetaCampaignsResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    # Auth
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    # User
    User:
      type: object
      required: [id, email, name, role, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, client, setter, closer]
        clientId:
          type: ["integer", "null"]
        avatarUrl:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string

    UserInput:
      type: object
      required: [email, name, role, password]
      properties:
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, client, setter, closer]
        password:
          type: string
        clientId:
          type: ["integer", "null"]
        avatarUrl:
          type: ["string", "null"]

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [admin, client, setter, closer]
        clientId:
          type: ["integer", "null"]
        avatarUrl:
          type: ["string", "null"]
        isActive:
          type: boolean

    # Client
    Client:
      type: object
      required: [id, name, industry, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        industry:
          type: string
        contactName:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]
        contactPhone:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, inactive, prospect]
        monthlyBudget:
          type: ["number", "null"]
        metaAdAccountId:
          type: ["string", "null"]
        metaAccessToken:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    ClientInput:
      type: object
      required: [name, industry]
      properties:
        name:
          type: string
        industry:
          type: string
        contactName:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: string
        logoUrl:
          type: string
        status:
          type: string
          enum: [active, inactive, prospect]
        monthlyBudget:
          type: number
        metaAdAccountId:
          type: string
        metaAccessToken:
          type: string
        notes:
          type: string

    ClientUpdate:
      type: object
      properties:
        name:
          type: string
        industry:
          type: string
        contactName:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: string
        logoUrl:
          type: string
        status:
          type: string
          enum: [active, inactive, prospect]
        monthlyBudget:
          type: number
        metaAdAccountId:
          type: string
        metaAccessToken:
          type: string
        notes:
          type: string

    # Campaign
    Campaign:
      type: object
      required: [id, name, clientId, status, objective, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        clientId:
          type: integer
        clientName:
          type: ["string", "null"]
        metaCampaignId:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, paused, completed, draft]
        objective:
          type: string
        dailyBudget:
          type: ["number", "null"]
        totalBudget:
          type: ["number", "null"]
        startDate:
          type: ["string", "null"]
        endDate:
          type: ["string", "null"]
        spend:
          type: ["number", "null"]
        impressions:
          type: ["integer", "null"]
        clicks:
          type: ["integer", "null"]
        conversions:
          type: ["integer", "null"]
        roas:
          type: ["number", "null"]
        createdAt:
          type: string

    CampaignInput:
      type: object
      required: [name, clientId, objective]
      properties:
        name:
          type: string
        clientId:
          type: integer
        objective:
          type: string
        dailyBudget:
          type: number
        totalBudget:
          type: number
        startDate:
          type: string
        endDate:
          type: string

    CampaignUpdate:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [active, paused, completed, draft]
        objective:
          type: string
        dailyBudget:
          type: number
        totalBudget:
          type: number
        startDate:
          type: string
        endDate:
          type: string

    # Adset
    Adset:
      type: object
      required: [id, name, campaignId, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        campaignId:
          type: integer
        metaAdsetId:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, paused, completed, draft]
        dailyBudget:
          type: ["number", "null"]
        targeting:
          type: ["string", "null"]
        optimizationGoal:
          type: ["string", "null"]
        spend:
          type: ["number", "null"]
        impressions:
          type: ["integer", "null"]
        clicks:
          type: ["integer", "null"]
        createdAt:
          type: string

    AdsetInput:
      type: object
      required: [name, campaignId]
      properties:
        name:
          type: string
        campaignId:
          type: integer
        dailyBudget:
          type: number
        targeting:
          type: string
        optimizationGoal:
          type: string

    AdsetUpdate:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [active, paused, completed, draft]
        dailyBudget:
          type: number
        targeting:
          type: string
        optimizationGoal:
          type: string

    # Ad
    Ad:
      type: object
      required: [id, name, adsetId, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        adsetId:
          type: integer
        metaAdId:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, paused, disapproved, draft]
        headline:
          type: ["string", "null"]
        body:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        destinationUrl:
          type: ["string", "null"]
        spend:
          type: ["number", "null"]
        impressions:
          type: ["integer", "null"]
        clicks:
          type: ["integer", "null"]
        ctr:
          type: ["number", "null"]
        cpc:
          type: ["number", "null"]
        createdAt:
          type: string

    AdInput:
      type: object
      required: [name, adsetId]
      properties:
        name:
          type: string
        adsetId:
          type: integer
        headline:
          type: string
        body:
          type: string
        imageUrl:
          type: string
        destinationUrl:
          type: string

    AdUpdate:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [active, paused, disapproved, draft]
        headline:
          type: string
        body:
          type: string
        imageUrl:
          type: string
        destinationUrl:
          type: string

    # Insight
    Insight:
      type: object
      required: [id, campaignId, date, spend, impressions, clicks, createdAt]
      properties:
        id:
          type: integer
        campaignId:
          type: ["integer", "null"]
        adId:
          type: ["integer", "null"]
        date:
          type: string
        spend:
          type: number
        impressions:
          type: integer
        clicks:
          type: integer
        conversions:
          type: ["integer", "null"]
        ctr:
          type: ["number", "null"]
        cpc:
          type: ["number", "null"]
        cpm:
          type: ["number", "null"]
        roas:
          type: ["number", "null"]
        reach:
          type: ["integer", "null"]
        frequency:
          type: ["number", "null"]
        createdAt:
          type: string

    InsightsSummary:
      type: object
      required: [totalSpend, totalImpressions, totalClicks, totalConversions, avgCtr, avgRoas, avgCpc]
      properties:
        totalSpend:
          type: number
        totalImpressions:
          type: integer
        totalClicks:
          type: integer
        totalConversions:
          type: integer
        avgCtr:
          type: number
        avgRoas:
          type: number
        avgCpc:
          type: number

    # Setter Activity
    SetterActivity:
      type: object
      required: [id, setterId, date, outreachCount, callsBooked, showRate, createdAt]
      properties:
        id:
          type: integer
        setterId:
          type: integer
        setterName:
          type: ["string", "null"]
        date:
          type: string
        outreachCount:
          type: integer
        callsBooked:
          type: integer
        showRate:
          type: number
        responseRate:
          type: ["number", "null"]
        platform:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    SetterActivityInput:
      type: object
      required: [setterId, date, outreachCount, callsBooked, showRate]
      properties:
        setterId:
          type: integer
        date:
          type: string
        outreachCount:
          type: integer
        callsBooked:
          type: integer
        showRate:
          type: number
        responseRate:
          type: number
        platform:
          type: string
        notes:
          type: string

    SetterActivityUpdate:
      type: object
      properties:
        outreachCount:
          type: integer
        callsBooked:
          type: integer
        showRate:
          type: number
        responseRate:
          type: number
        platform:
          type: string
        notes:
          type: string

    SetterStats:
      type: object
      required: [setterId, setterName, totalOutreach, totalCallsBooked, avgShowRate, period]
      properties:
        setterId:
          type: integer
        setterName:
          type: string
        totalOutreach:
          type: integer
        totalCallsBooked:
          type: integer
        avgShowRate:
          type: number
        avgResponseRate:
          type: ["number", "null"]
        period:
          type: string

    # Closer Activity
    CloserActivity:
      type: object
      required: [id, closerId, date, callsTaken, dealsWon, revenue, closeRate, createdAt]
      properties:
        id:
          type: integer
        closerId:
          type: integer
        closerName:
          type: ["string", "null"]
        clientId:
          type: ["integer", "null"]
        date:
          type: string
        callsTaken:
          type: integer
        dealsWon:
          type: integer
        revenue:
          type: number
        closeRate:
          type: number
        avgDealSize:
          type: ["number", "null"]
        objections:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    CloserActivityInput:
      type: object
      required: [closerId, date, callsTaken, dealsWon, revenue, closeRate]
      properties:
        closerId:
          type: integer
        clientId:
          type: integer
        date:
          type: string
        callsTaken:
          type: integer
        dealsWon:
          type: integer
        revenue:
          type: number
        closeRate:
          type: number
        avgDealSize:
          type: number
        objections:
          type: string
        notes:
          type: string

    CloserActivityUpdate:
      type: object
      properties:
        callsTaken:
          type: integer
        dealsWon:
          type: integer
        revenue:
          type: number
        closeRate:
          type: number
        avgDealSize:
          type: number
        objections:
          type: string
        notes:
          type: string

    CloserStats:
      type: object
      required: [closerId, closerName, totalCalls, totalDealsWon, totalRevenue, avgCloseRate, period]
      properties:
        closerId:
          type: integer
        closerName:
          type: string
        totalCalls:
          type: integer
        totalDealsWon:
          type: integer
        totalRevenue:
          type: number
        avgCloseRate:
          type: number
        avgDealSize:
          type: ["number", "null"]
        period:
          type: string

    # Revenue
    Revenue:
      type: object
      required: [id, clientId, amount, type, date, createdAt]
      properties:
        id:
          type: integer
        clientId:
          type: integer
        clientName:
          type: ["string", "null"]
        closerId:
          type: ["integer", "null"]
        amount:
          type: number
        type:
          type: string
          enum: [new_deal, renewal, upsell, refund]
        date:
          type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string

    RevenueInput:
      type: object
      required: [clientId, amount, type, date]
      properties:
        clientId:
          type: integer
        closerId:
          type: integer
        amount:
          type: number
        type:
          type: string
          enum: [new_deal, renewal, upsell, refund]
        date:
          type: string
        description:
          type: string

    RevenueUpdate:
      type: object
      properties:
        amount:
          type: number
        type:
          type: string
          enum: [new_deal, renewal, upsell, refund]
        date:
          type: string
        description:
          type: string

    RevenueSummary:
      type: object
      required: [totalRevenue, monthlyRevenue, revenueByType, revenueByMonth]
      properties:
        totalRevenue:
          type: number
        monthlyRevenue:
          type: number
        revenueGrowth:
          type: number
        revenueByType:
          type: array
          items:
            $ref: "#/components/schemas/RevenueByType"
        revenueByMonth:
          type: array
          items:
            $ref: "#/components/schemas/RevenueByMonth"

    RevenueByType:
      type: object
      required: [type, amount, count]
      properties:
        type:
          type: string
        amount:
          type: number
        count:
          type: integer

    RevenueByMonth:
      type: object
      required: [month, amount]
      properties:
        month:
          type: string
        amount:
          type: number

    # Report
    Report:
      type: object
      required: [id, title, type, status, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
          enum: [weekly, monthly, campaign, revenue, ai_summary]
        clientId:
          type: ["integer", "null"]
        clientName:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, generating, ready, failed]
        fileUrl:
          type: ["string", "null"]
        summary:
          type: ["string", "null"]
        dateFrom:
          type: ["string", "null"]
        dateTo:
          type: ["string", "null"]
        createdAt:
          type: string

    ReportInput:
      type: object
      required: [title, type]
      properties:
        title:
          type: string
        type:
          type: string
          enum: [weekly, monthly, campaign, revenue, ai_summary]
        clientId:
          type: integer
        dateFrom:
          type: string
        dateTo:
          type: string

    # AI Insight
    AiInsight:
      type: object
      required: [id, type, content, createdAt]
      properties:
        id:
          type: integer
        clientId:
          type: ["integer", "null"]
        clientName:
          type: ["string", "null"]
        campaignId:
          type: ["integer", "null"]
        type:
          type: string
          enum: [campaign_summary, performance_analysis, weekly_insights, loss_debrief, call_coaching, revenue_analysis, recommendations]
        content:
          type: string
        prompt:
          type: ["string", "null"]
        model:
          type: string
        createdAt:
          type: string

    AiInsightRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [campaign_summary, performance_analysis, weekly_insights, loss_debrief, call_coaching, revenue_analysis, recommendations]
        clientId:
          type: integer
        campaignId:
          type: integer
        context:
          type: string

    # Notification
    Notification:
      type: object
      required: [id, title, message, type, isRead, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        message:
          type: string
        type:
          type: string
          enum: [alert, info, warning, success]
        isRead:
          type: boolean
        link:
          type: ["string", "null"]
        createdAt:
          type: string

    # Slack
    SlackLog:
      type: object
      required: [id, channel, message, status, createdAt]
      properties:
        id:
          type: integer
        channel:
          type: string
        message:
          type: string
        status:
          type: string
          enum: [sent, failed, pending]
        triggeredBy:
          type: ["string", "null"]
        errorMessage:
          type: ["string", "null"]
        createdAt:
          type: string

    SlackMessageInput:
      type: object
      required: [channel, message]
      properties:
        channel:
          type: string
        message:
          type: string

    # Dashboard
    DashboardSummary:
      type: object
      required: [totalClients, activeClients, totalCampaigns, activeCampaigns, totalRevenue, monthlyRevenue, totalSpend, avgRoas, openNotifications]
      properties:
        totalClients:
          type: integer
        activeClients:
          type: integer
        totalCampaigns:
          type: integer
        activeCampaigns:
          type: integer
        totalRevenue:
          type: number
        monthlyRevenue:
          type: number
        totalSpend:
          type: number
        avgRoas:
          type: number
        openNotifications:
          type: integer
        topPerformingCampaign:
          $ref: "#/components/schemas/Campaign"

    ActivityFeedItem:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        entityType:
          type: ["string", "null"]
        entityId:
          type: ["integer", "null"]
        userName:
          type: ["string", "null"]
        createdAt:
          type: string

    PerformanceMetrics:
      type: object
      required: [period, spendByDay, revenueByDay, callsBookedByDay, dealsWonByDay]
      properties:
        period:
          type: string
        spendByDay:
          type: array
          items:
            $ref: "#/components/schemas/MetricByDay"
        revenueByDay:
          type: array
          items:
            $ref: "#/components/schemas/MetricByDay"
        callsBookedByDay:
          type: array
          items:
            $ref: "#/components/schemas/MetricByDay"
        dealsWonByDay:
          type: array
          items:
            $ref: "#/components/schemas/MetricByDay"

    MetricByDay:
      type: object
      required: [date, value]
      properties:
        date:
          type: string
        value:
          type: number

    MetaConfig:
      type: object
      required: [appId, redirectUri, scopes]
      properties:
        appId:
          type: string
        redirectUri:
          type: string
        scopes:
          type: string

    MetaStatus:
      type: object
      required: [connected]
      properties:
        connected:
          type: boolean
        accountId:
          type: string
        scopes:
          type: string
        expiresAt:
          type: ["string", "null"]

    MetaCampaign:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        objective:
          type: string
        daily_budget:
          type: string
        spend:
          type: string

    MetaCampaignsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MetaCampaign"
        error:
          type: object
          properties:
            message:
              type: string
